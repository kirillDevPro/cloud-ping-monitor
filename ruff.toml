# Ruff configuration
# https://docs.astral.sh/ruff/configuration/

target-version = "py312"
line-length = 100

[lint]
# Базовые правила (E - pycodestyle errors, F - pyflakes, W - warnings)
select = ["E", "F", "W"]

# Игнорируем глобально
ignore = [
    "E501",  # line too long - управляется форматтером
]

[lint.per-file-ignores]
# Игнорируем E402 в файлах где нужен sys.path до импортов
"main.py" = ["E402"]
